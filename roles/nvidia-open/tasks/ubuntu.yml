
- name: Install Drivers & setup prerequisits
  become: true
  apt:
    name:
      - curl
    state: present

- name: Install Nvidia CUDA Repos
  become: true
  shell: |
    wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/{{ cuda_host_arch }}/cuda-keyring_1.1-1_all.deb
    sudo dpkg -i cuda-keyring_1.1-1_all.deb
  args:
    creates: "/etc/apt/sources.list.d/cuda-ubuntu2404-{{ cuda_host_arch }}.list"


- name: Uninstall conflicting drivers # because they were possibly on it at one time and will create issues with apt
  become: true
  apt:
    name:
      - nvidia-driver-575-server-open
      - nvidia-driver-570-server
    state: absent

- name: Install Nvidia Driver & CUDA Toolkit
  become: true
  apt:
    update_cache: yes
    name:
      - nvidia-driver-570
      - cuda-toolkit-12-8
    state: present

- name: Setup Nvidia Container Toolkit repo
  become: true
  shell: |
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg \
    && curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
    sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
    sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  args:
    creates: "/etc/apt/sources.list.d/nvidia-container-toolkit.list"

- name: Install  and container toolkit
  become: true
  apt:
    update_cache: yes
    name:
      - nvidia-container-toolkit
    state: present

- name: Load Nvidia module
  become: true
  community.general.modprobe:
    name: nvidia
    state: present

- name: Unload nouveau module
  become: true
  community.general.modprobe:
    name: nouveau
    state: absent